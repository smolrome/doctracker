[pytest]
# Run from: doctracker/
# Command : pytest

testpaths      = tests
python_files   = test_*.py
python_classes = Test*
python_functions = test_*

# Show short summary for failures/errors
addopts =
    -v
    --tb=short
    --strict-markers

# Custom markers
markers =
    slow: mark a test as slow-running
    integration: mark a test as requiring external services (DB, email)
