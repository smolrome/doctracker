<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DocTracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #0D1B2A;
      --blue: #1B4F8A;
      --accent: #3B82F6;
      --teal: #0EA5E9;
      --surface: #F4F7FB;
      --card: #FFFFFF;
      --border: #DDE3EE;
      --text: #1A2B45;
      --muted: #6B7FA3;
      --success: #10B981;
      --warning: #F59E0B;
      --danger: #EF4444;
      --radius: 12px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--surface);
      color: var(--text);
      min-height: 100vh;
    }

    /* NAV */
    nav {
      background: var(--navy);
      padding: 0 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 16px rgba(13,27,42,0.18);
    }
    .nav-brand {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 20px;
      color: #fff;
      text-decoration: none;
      letter-spacing: -0.5px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .nav-brand span {
      background: var(--accent);
      color: #fff;
      padding: 3px 9px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.05em;
    }
    .nav-add {
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      padding: 8px 18px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 14px;
      transition: background 0.2s;
    }
    .nav-add:hover { background: #2563EB; }

    /* FLASH */
    .flash-wrap { padding: 12px 32px 0; }
    .flash {
      padding: 12px 18px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 8px;
    }
    .flash.success { background: #D1FAE5; color: #065F46; border-left: 4px solid var(--success); }
    .flash.error   { background: #FEE2E2; color: #7F1D1D; border-left: 4px solid var(--danger); }

    /* MAIN */
    .main { max-width: 1200px; margin: 0 auto; padding: 32px; }

    /* STATS */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 16px;
      margin-bottom: 28px;
    }
    .stat-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 20px;
      border: 1.5px solid var(--border);
      position: relative;
      overflow: hidden;
    }
    .stat-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: var(--accent);
    }
    .stat-card.green::before { background: var(--success); }
    .stat-card.yellow::before { background: var(--warning); }
    .stat-card.red::before { background: var(--danger); }
    .stat-card.teal::before { background: var(--teal); }
    .stat-num {
      font-family: 'Syne', sans-serif;
      font-size: 32px;
      font-weight: 800;
      color: var(--navy);
      line-height: 1;
    }
    .stat-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-top: 4px;
    }

    /* FILTERS */
    .filters {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 20px;
    }
    .filters input, .filters select {
      padding: 8px 14px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-family: inherit;
      font-size: 14px;
      color: var(--text);
      background: var(--surface);
      outline: none;
    }
    .filters input { flex: 1; min-width: 200px; }
    .filters input:focus, .filters select:focus { border-color: var(--accent); }
    .btn-filter {
      padding: 8px 16px;
      border-radius: 8px;
      border: 1.5px solid var(--border);
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      background: var(--surface);
      color: var(--muted);
      text-decoration: none;
      transition: all 0.15s;
    }
    .btn-filter.active, .btn-filter:hover {
      background: var(--navy);
      color: #fff;
      border-color: var(--navy);
    }

    /* TABLE */
    .table-wrap {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .table-head {
      padding: 16px 20px;
      border-bottom: 1.5px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .table-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 15px;
      color: var(--navy);
    }
    .table-count { font-size: 13px; color: var(--muted); }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      padding: 11px 16px;
      text-align: left;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      background: var(--surface);
      border-bottom: 1.5px solid var(--border);
    }
    tbody tr { transition: background 0.12s; cursor: pointer; }
    tbody tr:hover { background: #F0F5FF; }
    tbody tr:not(:last-child) td { border-bottom: 1px solid var(--border); }
    td {
      padding: 13px 16px;
      font-size: 14px;
      vertical-align: middle;
    }
    .doc-name { font-weight: 600; color: var(--navy); }
    .doc-id { font-size: 12px; color: var(--muted); font-family: monospace; }

    /* STATUS BADGE */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
    }
    .badge::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
      opacity: 0.7;
    }
    .badge-pending   { background: #FFF3CD; color: #856404; }
    .badge-review    { background: #CCE5FF; color: #004085; }
    .badge-released  { background: #D4EDDA; color: #155724; }
    .badge-hold      { background: #F8D7DA; color: #721C24; }
    .badge-archived  { background: #E2E3E5; color: #383D41; }

    /* EMPTY */
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }
    .empty-icon { font-size: 48px; margin-bottom: 12px; }
    .empty h3 { font-family: 'Syne', sans-serif; font-size: 18px; margin-bottom: 6px; color: var(--navy); }
    .empty p { font-size: 14px; }

    /* BUTTONS */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 9px 18px;
      border-radius: 8px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      text-decoration: none;
      transition: all 0.15s;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: #2563EB; }
    .btn-secondary { background: var(--surface); color: var(--text); border: 1.5px solid var(--border); }
    .btn-secondary:hover { background: var(--border); }
    .btn-danger { background: #FEE2E2; color: var(--danger); }
    .btn-danger:hover { background: var(--danger); color: #fff; }
    .btn-sm { padding: 6px 13px; font-size: 13px; }

    /* DETAIL/FORM PAGE */
    .page-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 28px;
    }
    .page-back {
      color: var(--muted);
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .page-back:hover { color: var(--accent); }
    .page-title {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 24px;
      color: var(--navy);
    }

    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }
    @media (max-width: 700px) { .detail-grid { grid-template-columns: 1fr; } }
    .detail-card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
    }
    .detail-card h3 {
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 18px;
      padding-bottom: 12px;
      border-bottom: 1.5px solid var(--border);
    }
    .detail-field { margin-bottom: 14px; }
    .detail-field label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 3px;
    }
    .detail-field .val { font-size: 14px; color: var(--text); font-weight: 500; }
    .detail-field .val.empty { color: #C0CCDA; }

    .detail-actions {
      display: flex;
      gap: 10px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    /* FORM */
    .form-card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      margin-bottom: 20px;
    }
    .form-card h3 {
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1.5px solid var(--border);
    }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 600px) { .form-row { grid-template-columns: 1fr; } }
    .form-group { margin-bottom: 16px; }
    .form-group label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 5px;
    }
    .form-group label .req { color: var(--danger); margin-left: 3px; }
    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 9px 13px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-family: inherit;
      font-size: 14px;
      color: var(--text);
      background: var(--surface);
      outline: none;
      transition: border 0.15s;
    }
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus { border-color: var(--accent); background: #fff; }
    .form-group textarea { resize: vertical; }
    .form-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <nav>
    <a href="/" class="nav-brand">
      📂 DocTracker <span>v1.0</span>
    </a>
    <div style="display:flex;gap:10px;align-items:center;">
      <a href="/scan" class="nav-add" style="background:#0EA5E9;">📷 Scan Document</a>
      <a href="/add" class="nav-add">+ Add Manually</a>
    </div>
  </nav>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      <div class="flash-wrap">
        {% for category, message in messages %}
          <div class="flash {{ category }}">{{ message }}</div>
        {% endfor %}
      </div>
    {% endif %}
  {% endwith %}

  <div class="main">
    {% block content %}{% endblock %}
  </div>
</body>
</html>
