<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Staff Login — DepEd Leyte DocTracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{
      font-family:'Source Sans 3',sans-serif;min-height:100vh;
      background: linear-gradient(135deg, #0A4D68 0%, #0E7490 50%, #059669 100%);
      display:flex; align-items:center; justify-content:center; padding:20px;
    }
    .wrap{width:100%;max-width:460px;}

    /* Header */
    .header{text-align:center;margin-bottom:28px;}
    .header-logo{
      width:80px;height:80px;border-radius:20px;margin:0 auto 16px;
      background:rgba(255,255,255,.15);border:3px solid rgba(255,255,255,.3);
      display:flex;align-items:center;justify-content:center;font-size:40px;
    }
    .header-title{font-family:'Outfit',sans-serif;font-size:28px;font-weight:900;color:#fff;margin-bottom:4px;}
    .header-sub{font-size:15px;color:rgba(255,255,255,.8);line-height:1.5;}

    /* Card */
    .card{background:#fff;border-radius:20px;padding:36px;box-shadow:0 24px 80px rgba(0,0,0,.3);}
    .card-title{font-family:'Outfit',sans-serif;font-size:22px;font-weight:800;color:#0A2540;margin-bottom:6px;}
    .card-sub{font-size:15px;color:#5A7A91;margin-bottom:24px;}

    .error-box{background:#FEE2E2;border:2px solid #FCA5A5;border-radius:10px;padding:14px 16px;font-size:15px;color:#7F1D1D;margin-bottom:20px;display:flex;align-items:center;gap:10px;}

    .form-group{margin-bottom:18px;}
    .form-group label{display:block;font-size:15px;font-weight:700;color:#2D4A63;margin-bottom:8px;}
    .form-group input{
      width:100%;padding:15px 18px;
      border:2px solid #C8DDE8;border-radius:10px;
      font-family:inherit;font-size:18px;color:#0A2540;background:#F0F7FA;
      outline:none;min-height:58px;transition:border .15s,box-shadow .15s;
    }
    .form-group input:focus{border-color:#0E7490;background:#fff;box-shadow:0 0 0 4px rgba(14,116,144,.15);}

    .btn{
      width:100%;padding:17px;border-radius:10px;border:none;cursor:pointer;
      font-family:inherit;font-size:18px;font-weight:700;min-height:58px;
      background:linear-gradient(135deg,#0A4D68,#0E7490);color:#fff;
      box-shadow:0 6px 20px rgba(10,77,104,.4);transition:all .2s;
    }
    .btn:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(10,77,104,.5);}

    .footer-links{display:flex;justify-content:center;gap:20px;margin-top:20px;flex-wrap:wrap;}
    .footer-links a{font-size:14px;color:rgba(255,255,255,.85);text-decoration:none;font-weight:600;}
    .footer-links a:hover{color:#fff;text-decoration:underline;}

    #loading-overlay{display:none;position:fixed;inset:0;background:rgba(10,37,64,.65);backdrop-filter:blur(4px);z-index:999;align-items:center;justify-content:center;}
    #loading-overlay.active{display:flex;}
    .loading-box{background:#fff;border-radius:20px;padding:36px 48px;text-align:center;}
    .loading-spinner{width:52px;height:52px;border:5px solid #C8DDE8;border-top-color:#0E7490;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 16px;}
    .loading-text{font-family:'Outfit',sans-serif;font-size:18px;font-weight:700;color:#0A2540;}
    @keyframes spin{to{transform:rotate(360deg);}}
  </style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <img src="/logo.png" alt="DepEd Leyte Logo" class="header-logo-img"/>
    <div class="header-title">DocTracker</div>
    <div class="header-sub">DepEd Leyte Division<br/>Document Tracking System</div>
  </div>

  <div class="card">
    <div class="card-title">Staff Sign In</div>
    <div class="card-sub">Enter your credentials to access the system.</div>

    {% if error %}
    <div class="error-box">❌ {{ error }}</div>
    {% endif %}

    <form method="post" id="login-form">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="Enter your username" autocomplete="username" autofocus required/>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter your password" autocomplete="current-password" required/>
      </div>
      <button type="submit" class="btn">🔐 Sign In</button>
    </form>
  </div>

  <div class="footer-links">
    <a href="/client/login">📱 Client Portal</a>
    <a href="/">👁 View Dashboard</a>
  </div>
</div>

<div id="loading-overlay">
  <div class="loading-box">
    <div class="loading-spinner"></div>
    <div class="loading-text">Signing in...</div>
  </div>
</div>
<script>
document.getElementById('login-form').addEventListener('submit',()=>document.getElementById('loading-overlay').classList.add('active'));
window.addEventListener('pageshow',e=>{if(e.persisted)document.getElementById('loading-overlay').classList.remove('active');});
</script>
</body>
</html>
