<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>Submit Document — DocTracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{--green:#10B981;--dark-green:#064E3B;--navy:#0D1B2A;--surface:#F4F7FB;--border:#DDE3EE;--text:#1A2B45;--muted:#6B7FA3;}
    body{font-family:'DM Sans',sans-serif;background:var(--surface);min-height:100vh;}
    .topbar{background:var(--dark-green);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;gap:10px;}
    .topbar-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;color:#fff;}
    .topbar a{color:#A7F3D0;font-size:13px;font-weight:600;text-decoration:none;}
    .page{max-width:600px;margin:0 auto;padding:24px 16px;}
    .page-title{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:var(--navy);margin-bottom:20px;}
    .card{background:#fff;border:1.5px solid var(--border);border-radius:14px;padding:24px;margin-bottom:20px;}
    .card h3{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:16px;padding-bottom:10px;border-bottom:1.5px solid var(--border);}
    .form-group{margin-bottom:16px;}
    .form-group label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:5px;}
    .form-group label .req{color:#EF4444;margin-left:2px;}
    .form-group input,.form-group select,.form-group textarea{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:10px;font-family:inherit;font-size:16px;color:var(--text);background:var(--surface);outline:none;min-height:50px;transition:border .15s;}
    .form-group textarea{min-height:90px;resize:vertical;}
    .form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--green);background:#fff;box-shadow:0 0 0 3px rgba(16,185,129,.15);}
    .btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px;background:var(--green);color:#fff;border:none;border-radius:10px;font-family:inherit;font-size:16px;font-weight:700;cursor:pointer;min-height:52px;}
    .btn:hover{background:#059669;}
    .btn-cancel{background:#F4F7FB;color:var(--muted);border:1.5px solid var(--border);margin-bottom:10px;}
    .btn-cancel:hover{background:#E5E7EB;}
    #loading-overlay{display:none;position:fixed;inset:0;background:rgba(6,78,59,.6);backdrop-filter:blur(3px);z-index:999;align-items:center;justify-content:center;}
    #loading-overlay.active{display:flex;}
    .loading-box{background:#fff;border-radius:16px;padding:32px 40px;text-align:center;}
    .loading-spinner{width:44px;height:44px;border:4px solid #DDE3EE;border-top-color:var(--green);border-radius:50%;animation:spin .75s linear infinite;margin:0 auto 14px;}
    .loading-text{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:var(--dark-green);}
    @keyframes spin{to{transform:rotate(360deg);}}
  </style>
</head>
<body>
<div class="topbar">
  <div class="topbar-title">📋 Submit Document</div>
  <a href="/client">← My Documents</a>
</div>
<div class="page">
  <div class="page-title">📄 New Document Submission</div>
  <form method="post" id="submit-form">

    <div class="card">
      <h3>📍 Source Information</h3>
      <div class="form-group">
        <label>Unit / Office / School / District <span class="req">*</span></label>
        <input type="text" name="unit_office" placeholder="e.g. Ormoc City Schools Division" value="{{ doc.get('sender_org','') }}" required/>
      </div>
      <div class="form-group">
        <label>Source / Sender Name <span class="req">*</span></label>
        <input type="text" name="sender_display" placeholder="Name of person/office sending the document" value="{{ doc.get('sender_name','') }}" required/>
      </div>
    </div>

    <div class="card">
      <h3>📄 Document Details</h3>
      <div class="form-group">
        <label>Content / Particulars <span class="req">*</span></label>
        <input type="text" name="doc_name" placeholder="e.g. Plantilla of Personnel, Leave Application" value="{{ doc.get('doc_name','') }}" required/>
      </div>
      <div class="form-group">
        <label>Document Type / Category</label>
        <select name="category">
          <option value="">— Select type —</option>
          <option value="Letter" {% if doc.get('category')=='Letter' %}selected{% endif %}>Letter</option>
          <option value="Memorandum" {% if doc.get('category')=='Memorandum' %}selected{% endif %}>Memorandum</option>
          <option value="Report" {% if doc.get('category')=='Report' %}selected{% endif %}>Report</option>
          <option value="Application" {% if doc.get('category')=='Application' %}selected{% endif %}>Application</option>
          <option value="Voucher" {% if doc.get('category')=='Voucher' %}selected{% endif %}>Voucher</option>
          <option value="Plantilla" {% if doc.get('category')=='Plantilla' %}selected{% endif %}>Plantilla</option>
          <option value="Payroll" {% if doc.get('category')=='Payroll' %}selected{% endif %}>Payroll</option>
          <option value="Other" {% if doc.get('category')=='Other' %}selected{% endif %}>Other</option>
        </select>
      </div>
      <div class="form-group">
        <label>Additional Description / Remarks</label>
        <textarea name="description" placeholder="Any additional details about the document...">{{ doc.get('description','') }}</textarea>
      </div>
    </div>

    <div class="card">
      <h3>📬 Routing</h3>
      <div class="form-group">
        <label>Referred To <span class="req">*</span></label>
        <input type="text" name="referred_to" placeholder="e.g. Schools Division Superintendent, Budget Officer" value="{{ doc.get('referred_to','') }}" required/>
      </div>
      <div class="form-group">
        <label>Additional Notes</label>
        <textarea name="notes" placeholder="Any special instructions or notes...">{{ doc.get('notes','') }}</textarea>
      </div>
    </div>

    <a href="/client" class="btn btn-cancel">Cancel</a>
    <button type="submit" class="btn">📤 Submit Document</button>
  </form>
</div>
<div id="loading-overlay">
  <div class="loading-box">
    <div class="loading-spinner"></div>
    <div class="loading-text">Submitting document...</div>
  </div>
</div>
<script>
document.getElementById('submit-form').addEventListener('submit',()=>document.getElementById('loading-overlay').classList.add('active'));
window.addEventListener('pageshow',e=>{if(e.persisted)document.getElementById('loading-overlay').classList.remove('active');});
</script>
</body>
</html>
