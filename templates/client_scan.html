<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Scan QR — DocTracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@700;800;900&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{font-size:16px;-webkit-text-size-adjust:100%;text-size-adjust:100%;}
    body{font-family:'Source Sans 3',sans-serif;background:#0A2540;min-height:100vh;
      display:flex;flex-direction:column;overflow:hidden;}

    /* ── TOPBAR ── */
    .topbar{
      background:linear-gradient(135deg,#0A4D68 0%,#0E7490 55%,#059669 100%);
      height:60px;display:flex;align-items:center;padding:0 16px;
      justify-content:space-between;gap:12px;flex-shrink:0;
      box-shadow:0 4px 20px rgba(10,45,100,.4);
      position:relative;z-index:10;
    }
    .topbar::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;
      background:linear-gradient(90deg,#22D3EE,#34D399,#22D3EE);}
    .topbar-brand{display:flex;align-items:center;gap:10px;}
    .topbar-brand img{width:36px;height:36px;border-radius:50%;object-fit:cover;
      border:2px solid rgba(255,255,255,.4);background:#fff;flex-shrink:0;}
    .topbar-title{font-family:'Outfit',sans-serif;font-size:17px;font-weight:900;color:#fff;}
    .topbar-back{color:rgba(255,255,255,.9);font-size:15px;font-weight:700;
      text-decoration:none;padding:8px 12px;border-radius:8px;
      background:rgba(255,255,255,.12);border:1.5px solid rgba(255,255,255,.25);}

    /* ── SCANNER BODY ── */
    .scanner-body{
      flex:1;display:flex;flex-direction:column;align-items:center;
      justify-content:center;padding:20px 16px;gap:16px;
      /* Prevent scroll bouncing on iOS */
      overflow:hidden;
    }

    /* ── CAMERA BOX ── */
    .camera-box{
      position:relative;
      width:min(360px, calc(100vw - 32px));
      aspect-ratio:1/1;
      border-radius:18px;overflow:hidden;background:#000;
      box-shadow:0 12px 40px rgba(0,0,0,.5);
      flex-shrink:0;
    }
    #qr-video{width:100%;height:100%;object-fit:cover;display:block;}
    .scan-overlay{position:absolute;inset:0;display:flex;align-items:center;
      justify-content:center;pointer-events:none;}
    .scan-frame{
      width:min(220px, calc(100vw - 100px));
      height:min(220px, calc(100vw - 100px));
      border-radius:14px;
      box-shadow:0 0 0 9999px rgba(0,0,0,.5);
      position:relative;
    }
    /* Corner brackets */
    .sc{position:absolute;width:28px;height:28px;border-color:#22D3EE;border-style:solid;}
    .sc.tl{top:-3px;left:-3px;border-width:4px 0 0 4px;border-radius:5px 0 0 0;}
    .sc.tr{top:-3px;right:-3px;border-width:4px 4px 0 0;border-radius:0 5px 0 0;}
    .sc.bl{bottom:-3px;left:-3px;border-width:0 0 4px 4px;border-radius:0 0 0 5px;}
    .sc.br{bottom:-3px;right:-3px;border-width:0 4px 4px 0;border-radius:0 0 5px 0;}
    .scan-line{
      position:absolute;left:4px;right:4px;height:3px;
      background:linear-gradient(90deg,transparent,#22D3EE,transparent);
      animation:scanline 2s ease-in-out infinite;
      box-shadow:0 0 8px rgba(34,211,238,.8);
    }
    @keyframes scanline{
      0%  {top:8px;opacity:0;}
      10% {opacity:1;}
      90% {opacity:1;}
      100%{top:calc(100% - 8px);opacity:0;}
    }

    /* ── LABELS ── */
    .scan-title{font-family:'Outfit',sans-serif;font-size:20px;font-weight:800;
      color:#fff;text-align:center;}
    .scan-sub{font-size:16px;color:rgba(255,255,255,.65);text-align:center;
      max-width:320px;line-height:1.5;}

    /* ── STATUS BAR ── */
    .scan-status{
      width:min(380px,calc(100vw - 32px));
      padding:14px 18px;border-radius:12px;
      font-size:16px;font-weight:700;text-align:center;
    }
    .status-idle   {background:rgba(255,255,255,.08);color:rgba(255,255,255,.7);}
    .status-found  {background:rgba(34,211,238,.2);color:#A5F3FC;
      border:2px solid rgba(34,211,238,.4);}
    .status-error  {background:rgba(239,68,68,.15);color:#FCA5A5;
      border:2px solid rgba(239,68,68,.35);}

    /* ── BUTTONS ── */
    .btn-group{width:min(380px,calc(100vw - 32px));display:flex;flex-direction:column;gap:10px;}
    .btn{display:flex;align-items:center;justify-content:center;gap:8px;
      padding:16px;border-radius:12px;font-family:inherit;font-size:17px;
      font-weight:700;cursor:pointer;text-decoration:none;border:none;min-height:54px;
      transition:all .2s;}
    .btn-found{background:linear-gradient(135deg,#059669,#0E7490);color:#fff;
      box-shadow:0 5px 18px rgba(5,150,105,.4);}
    .btn-back{background:rgba(255,255,255,.1);color:rgba(255,255,255,.85);
      border:1.5px solid rgba(255,255,255,.2);}

    /* ── PERMISSION DENIED ── */
    .perm-box{
      width:min(380px,calc(100vw - 32px));
      background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.12);
      border-radius:16px;padding:28px 22px;text-align:center;
    }
    .perm-box h3{font-family:'Outfit',sans-serif;font-size:20px;font-weight:800;
      color:#fff;margin-bottom:10px;}
    .perm-box p{font-size:16px;color:rgba(255,255,255,.65);line-height:1.6;margin-bottom:18px;}

    @media(max-width:380px){
      .scan-title{font-size:18px;}
      .scan-sub{font-size:15px;}
      .btn{font-size:16px;min-height:50px;}
    }
  </style>
</head>
<body>
<div class="topbar">
  <div class="topbar-brand">
    <img src="/logo.png" alt="DepEd Leyte Logo"/>
    <span class="topbar-title">📷 Scan QR Code</span>
  </div>
  <a href="/client" class="topbar-back">← Back</a>
</div>

<div class="scanner-body">
  <div class="camera-box" id="camera-box">
    <video id="qr-video" playsinline autoplay muted></video>
    <div class="scan-overlay">
      <div class="scan-frame">
        <div class="sc tl"></div><div class="sc tr"></div>
        <div class="sc bl"></div><div class="sc br"></div>
        <div class="scan-line"></div>
      </div>
    </div>
  </div>

  <div class="scan-title">Point camera at document QR</div>
  <div class="scan-sub">Scan any document QR code to view and update its status.</div>

  <div class="scan-status status-idle" id="scan-status">📷 Starting camera...</div>

  <div class="btn-group">
    <a href="#" id="result-btn" class="btn btn-found" style="display:none;">⚡ Open Document</a>
    <a href="/client" class="btn btn-back">← My Documents</a>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jsqr/1.4.0/jsQR.min.js"></script>
<script>
const video     = document.getElementById('qr-video');
const statusEl  = document.getElementById('scan-status');
const resultBtn = document.getElementById('result-btn');
const cameraBox = document.getElementById('camera-box');
let scanning = true, lastDetected = null;

async function startCamera(){
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video:{facingMode:{ideal:'environment'},width:{ideal:1280},height:{ideal:720}}
    });
    video.srcObject = stream;
    await video.play();
    statusEl.textContent = '📷 Scanning — point at a QR code';
    statusEl.className = 'scan-status status-idle';
    requestAnimationFrame(tick);
  } catch(err) {
    statusEl.className = 'scan-status status-error';
    statusEl.textContent = '❌ Camera access denied';
    cameraBox.innerHTML = `
      <div style="display:flex;align-items:center;justify-content:center;height:100%;padding:24px;text-align:center;">
        <div>
          <div style="font-size:48px;margin-bottom:12px;">📷</div>
          <div style="font-family:Outfit,sans-serif;font-size:18px;font-weight:800;color:#fff;margin-bottom:8px;">Camera Access Needed</div>
          <p style="font-size:15px;color:rgba(255,255,255,.65);line-height:1.6;">
            Allow camera access in your browser settings, then refresh this page.
          </p>
        </div>
      </div>`;
  }
}

function tick(){
  if(!scanning) return;
  if(video.readyState === video.HAVE_ENOUGH_DATA){
    const c = document.createElement('canvas');
    c.width = video.videoWidth; c.height = video.videoHeight;
    const ctx = c.getContext('2d');
    ctx.drawImage(video,0,0,c.width,c.height);
    const img = ctx.getImageData(0,0,c.width,c.height);
    const code = jsQR(img.data,img.width,img.height,{inversionAttempts:'dontInvert'});
    if(code && code.data !== lastDetected){
      lastDetected = code.data;
      onDetected(code.data);
      return;
    }
  }
  requestAnimationFrame(tick);
}

function onDetected(data){
  const m = data.match(/\/receive\/([A-Z0-9]{8})/i);
  if(m){
    const url = '/receive/'+m[1].toUpperCase();
    scanning = false;
    statusEl.className = 'scan-status status-found';
    statusEl.textContent = '✅ Document found! Opening...';
    resultBtn.href = url;
    resultBtn.textContent = '⚡ Open Document '+m[1].toUpperCase();
    resultBtn.style.display = 'flex';
    if(navigator.vibrate) navigator.vibrate([100,50,100]);
    setTimeout(()=>{ window.location.href = url; }, 1200);
  } else {
    lastDetected = null;
    requestAnimationFrame(tick);
  }
}

startCamera();
</script>
</body>
</html>
