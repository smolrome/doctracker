<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>Scan QR — DocTracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{--teal:#0E7490;--dark:#0A4D68;--navy:#0D1B2A;--surface:#F4F7FB;--border:#DDE3EE;--muted:#6B7FA3;}
    body{font-family:'Source Sans 3',sans-serif;background:var(--navy);min-height:100vh;display:flex;flex-direction:column;}
    .topbar{background:var(--dark);padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
    .topbar-brand{font-family:'Outfit',sans-serif;font-size:16px;font-weight:800;color:#fff;}
    .topbar a{color:#A7F3D0;font-size:13px;font-weight:600;text-decoration:none;}

    /* Scanner area */
    .scanner-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;gap:16px;}
    .scanner-box{position:relative;width:100%;max-width:360px;aspect-ratio:1;border-radius:16px;overflow:hidden;background:#000;}
    #qr-video{width:100%;height:100%;object-fit:cover;display:block;}
    .scan-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;}
    .scan-frame{width:220px;height:220px;border:3px solid var(--teal);border-radius:12px;box-shadow:0 0 0 9999px rgba(0,0,0,.45);position:relative;}
    .scan-corner{position:absolute;width:24px;height:24px;border-color:var(--teal);border-style:solid;}
    .scan-corner.tl{top:-3px;left:-3px;border-width:4px 0 0 4px;border-radius:4px 0 0 0;}
    .scan-corner.tr{top:-3px;right:-3px;border-width:4px 4px 0 0;border-radius:0 4px 0 0;}
    .scan-corner.bl{bottom:-3px;left:-3px;border-width:0 0 4px 4px;border-radius:0 0 0 4px;}
    .scan-corner.br{bottom:-3px;right:-3px;border-width:0 4px 4px 0;border-radius:0 0 4px 0;}
    .scan-line{position:absolute;left:4px;right:4px;height:2px;background:linear-gradient(90deg,transparent,var(--teal),transparent);animation:scanline 2s ease-in-out infinite;}
    @keyframes scanline{0%{top:8px;opacity:0;}10%{opacity:1;}90%{opacity:1;}100%{top:calc(100% - 8px);opacity:0;}}

    .scanner-label{font-family:'Outfit',sans-serif;font-size:16px;font-weight:700;color:#fff;text-align:center;}
    .scanner-sub{font-size:13px;color:#8EA8C3;text-align:center;max-width:300px;line-height:1.5;}

    /* Status */
    .scan-status{padding:12px 20px;border-radius:10px;font-size:14px;font-weight:600;text-align:center;width:100%;max-width:360px;}
    .scan-status.scanning{background:rgba(255,255,255,.08);color:#8EA8C3;}
    .scan-status.found{background:rgba(16,185,129,.2);color:#6EE7B7;border:1.5px solid rgba(16,185,129,.4);}
    .scan-status.error{background:rgba(239,68,68,.15);color:#FCA5A5;border:1.5px solid rgba(239,68,68,.3);}

    /* Bottom controls */
    .controls{width:100%;max-width:360px;display:flex;flex-direction:column;gap:10px;}
    .btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:14px;border-radius:10px;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;text-decoration:none;border:none;min-height:50px;}
    .btn-green{background:var(--teal);color:#fff;}
    .btn-outline{background:rgba(255,255,255,.08);color:#fff;border:1.5px solid rgba(255,255,255,.15);}

    /* Camera permission denied */
    .perm-denied{background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.1);border-radius:14px;padding:24px;text-align:center;width:100%;max-width:360px;}
    .perm-denied h3{font-family:'Outfit',sans-serif;font-size:16px;font-weight:800;color:#fff;margin-bottom:8px;}
    .perm-denied p{font-size:13px;color:#8EA8C3;line-height:1.6;margin-bottom:16px;}
  </style>
</head>
<body>
<div class="topbar">
  <div class="topbar-brand" style="display:flex;align-items:center;gap:8px;"><img src="/logo.png" alt="Logo" style="width:36px;height:36px;border-radius:50%;object-fit:cover;border:2px solid rgba(255,255,255,.4);background:#fff;"/> 📷 Scan QR</div>
  <a href="/client">← Back</a>
</div>

<div class="scanner-wrap">
  <div class="scanner-box" id="scanner-box">
    <video id="qr-video" playsinline autoplay muted></video>
    <div class="scan-overlay">
      <div class="scan-frame">
        <div class="scan-corner tl"></div>
        <div class="scan-corner tr"></div>
        <div class="scan-corner bl"></div>
        <div class="scan-corner br"></div>
        <div class="scan-line"></div>
      </div>
    </div>
  </div>

  <div class="scanner-label">Point camera at document QR</div>
  <div class="scanner-sub">Scan the QR code on your document to quickly update its status.</div>

  <div class="scan-status scanning" id="scan-status">📷 Starting camera...</div>

  <div class="controls">
    <div id="result-area" style="display:none;">
      <a href="#" id="result-btn" class="btn btn-green">⚡ Open Document</a>
    </div>
    <a href="/client" class="btn btn-outline">← My Documents</a>
  </div>
</div>

<!-- jsQR library for QR decoding -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsqr/1.4.0/jsQR.min.js"></script>
<script>
const video = document.getElementById('qr-video');
const statusEl = document.getElementById('scan-status');
const resultArea = document.getElementById('result-area');
const resultBtn = document.getElementById('result-btn');
const scannerBox = document.getElementById('scanner-box');
let scanning = true;
let lastDetected = null;

async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
    });
    video.srcObject = stream;
    video.play();
    statusEl.textContent = '📷 Scanning... point at a QR code';
    statusEl.className = 'scan-status scanning';
    requestAnimationFrame(tick);
  } catch(err) {
    statusEl.className = 'scan-status error';
    statusEl.textContent = '❌ Camera access denied';
    scannerBox.innerHTML = `
      <div class="perm-denied" style="margin:0;border-radius:16px;">
        <h3>📷 Camera Access Needed</h3>
        <p>Please allow camera access in your browser settings, then refresh the page.</p>
      </div>`;
  }
}

function tick() {
  if (!scanning) return;
  if (video.readyState === video.HAVE_ENOUGH_DATA) {
    const canvas = document.createElement('canvas');
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const code = jsQR(imageData.data, imageData.width, imageData.height, {
      inversionAttempts: 'dontInvert'
    });

    if (code && code.data !== lastDetected) {
      lastDetected = code.data;
      onQRDetected(code.data);
      return;
    }
  }
  requestAnimationFrame(tick);
}

function onQRDetected(data) {
  // Extract /receive/<id> URL pattern
  const match = data.match(/\/receive\/([A-Z0-9]{8})/i);
  if (match) {
    const docId = match[1].toUpperCase();
    const url = '/receive/' + docId;
    scanning = false;

    statusEl.className = 'scan-status found';
    statusEl.textContent = '✅ Document found! Tap button below.';

    resultBtn.href = url;
    resultBtn.textContent = '⚡ Open Document ' + docId;
    resultArea.style.display = 'block';

    // Vibrate on mobile if supported
    if (navigator.vibrate) navigator.vibrate([100, 50, 100]);

    // Auto-redirect after 1.5s
    setTimeout(() => { window.location.href = url; }, 1500);
  } else {
    // Not a DocTracker QR — keep scanning
    lastDetected = null;
    requestAnimationFrame(tick);
  }
}

startCamera();
</script>
</body>
</html>
