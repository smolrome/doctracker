<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Client Portal — DepEd Leyte DocTracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Source Sans 3',sans-serif;min-height:100vh;background:linear-gradient(135deg,#0A4D68 0%,#0E7490 50%,#059669 100%);display:flex;align-items:center;justify-content:center;padding:20px;}
    .wrap{width:100%;max-width:460px;}
    .header{text-align:center;margin-bottom:28px;}
    .header-logo-img{width:110px;height:110px;border-radius:50%;margin:0 auto 16px;display:block;object-fit:cover;border:4px solid rgba(255,255,255,.5);box-shadow:0 8px 32px rgba(0,0,0,.3);background:#fff;}
    .header-title{font-family:'Outfit',sans-serif;font-size:26px;font-weight:900;color:#fff;margin-bottom:4px;}
    .header-sub{font-size:15px;color:rgba(255,255,255,.8);line-height:1.5;}
    .card{background:#fff;border-radius:20px;padding:36px;box-shadow:0 24px 80px rgba(0,0,0,.3);}
    .card-title{font-family:'Outfit',sans-serif;font-size:22px;font-weight:800;color:#0A2540;margin-bottom:6px;}
    .card-sub{font-size:15px;color:#5A7A91;margin-bottom:24px;}
    .error-box{background:#FEE2E2;border:2px solid #FCA5A5;border-radius:10px;padding:14px 16px;font-size:15px;color:#7F1D1D;margin-bottom:20px;}
    .form-group{margin-bottom:18px;}
    .form-group label{display:block;font-size:15px;font-weight:700;color:#2D4A63;margin-bottom:8px;}
    .form-group input{width:100%;padding:15px 18px;border:2px solid #C8DDE8;border-radius:10px;font-family:inherit;font-size:18px;color:#0A2540;background:#F0F7FA;outline:none;min-height:58px;transition:border .15s,box-shadow .15s;}
    .form-group input:focus{border-color:#059669;background:#fff;box-shadow:0 0 0 4px rgba(5,150,105,.15);}
    .btn-main{width:100%;padding:17px;border-radius:10px;border:none;cursor:pointer;font-family:inherit;font-size:18px;font-weight:700;min-height:58px;background:linear-gradient(135deg,#059669,#0E7490);color:#fff;box-shadow:0 6px 20px rgba(5,150,105,.4);transition:all .2s;margin-bottom:14px;}
    .btn-main:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(5,150,105,.5);}
    .btn-register{width:100%;padding:15px;border-radius:10px;border:2px solid #C8DDE8;cursor:pointer;font-family:inherit;font-size:17px;font-weight:700;min-height:54px;background:#F0F7FA;color:#2D4A63;transition:all .2s;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:8px;}
    .btn-register:hover{border-color:#0E7490;color:#0E7490;background:#fff;}
    .divider{display:flex;align-items:center;gap:12px;margin:16px 0;color:#9ABECF;font-size:14px;}
    .divider::before,.divider::after{content:'';flex:1;height:1px;background:#C8DDE8;}
    .footer-links{display:flex;justify-content:center;gap:20px;margin-top:20px;flex-wrap:wrap;}
    .footer-links a{font-size:14px;color:rgba(255,255,255,.85);text-decoration:none;font-weight:600;}
    .footer-links a:hover{color:#fff;}
    #loading-overlay{display:none;position:fixed;inset:0;background:rgba(10,37,64,.65);backdrop-filter:blur(4px);z-index:999;align-items:center;justify-content:center;}
    #loading-overlay.active{display:flex;}
    .loading-box{background:#fff;border-radius:20px;padding:36px 48px;text-align:center;}
    .loading-spinner{width:52px;height:52px;border:5px solid #C8DDE8;border-top-color:#059669;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 16px;}
    .loading-text{font-family:'Outfit',sans-serif;font-size:18px;font-weight:700;color:#0A2540;}
    @keyframes spin{to{transform:rotate(360deg);}}
  </style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <img src="/logo.png" alt="DepEd Leyte Logo" class="header-logo-img"/>
    <div class="header-title">Client Portal</div>
    <div class="header-sub">DepEd Leyte Division<br/>Submit &amp; Track Your Documents</div>
  </div>
  <div class="card">
    <div class="card-title">Sign In</div>
    <div class="card-sub">Log in to submit and track your documents.</div>
    {% if error %}<div class="error-box">❌ {{ error }}</div>{% endif %}
    <form method="post" id="login-form">
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" placeholder="Enter your username" autocomplete="username" autofocus required/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="Enter your password" autocomplete="current-password" required/>
      </div>
      <button type="submit" class="btn-main">✅ Sign In</button>
    </form>
    <div class="divider">New here?</div>
    <a href="/client/register" class="btn-register">📝 Create Client Account</a>
  </div>
  <div class="footer-links">
    <a href="/login">🔐 Staff Login</a>
    <a href="/">👁 View Dashboard</a>
  </div>
</div>
<div id="loading-overlay">
  <div class="loading-box"><div class="loading-spinner"></div><div class="loading-text">Signing in...</div></div>
</div>
<script>
document.getElementById('login-form').addEventListener('submit',()=>document.getElementById('loading-overlay').classList.add('active'));
window.addEventListener('pageshow',e=>{if(e.persisted)document.getElementById('loading-overlay').classList.remove('active');});
</script>
</body>
</html>
