<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0"/>
  <title>Client Login — DocTracker DepEd Leyte</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --grad-start:  #0d4f7c;
      --grad-end:    #0f8a72;
      --bg:          #f0f6f9;
      --surface:     #ffffff;
      --border:      #cce0ea;
      --text:        #0d2d3d;
      --sub:         #3d6070;
      --muted:       #6a8fa0;
      --accent:      #0f8a72;
      --accent-dark: #0a6b58;
      --danger-bg:   #fde8e8;
      --danger-text: #7a1010;
      --danger-bdr:  #f5a0a0;
      --radius:      14px;
    }

    html { -webkit-text-size-adjust: 100%; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: linear-gradient(150deg, var(--grad-start) 0%, #0d6b72 55%, var(--grad-end) 100%);
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: clamp(16px, 4vw, 32px);
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,0.06) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(255,255,255,0.04) 0%, transparent 50%);
      pointer-events: none;
    }

    .wrap {
      width: 100%;
      max-width: 460px;
      position: relative;
      z-index: 1;
    }

    /* ── HEADER ── */
    .header {
      text-align: center;
      margin-bottom: clamp(20px, 4vw, 32px);
    }
    .header-logo {
      width: 72px; height: 72px;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(8px);
      border: 2px solid rgba(255,255,255,0.25);
      border-radius: 20px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      margin-bottom: 14px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
    }
    .header-title {
      font-size: clamp(24px, 5vw, 30px);
      font-weight: 700;
      color: #ffffff;
      letter-spacing: -0.5px;
      margin-bottom: 5px;
    }
    .header-sub {
      font-size: clamp(13px, 2vw, 15px);
      color: rgba(255,255,255,0.75);
      line-height: 1.4;
    }

    /* ── CARD ── */
    .card {
      background: var(--surface);
      border-radius: 20px;
      padding: clamp(24px, 5vw, 40px) clamp(20px, 5vw, 36px);
      box-shadow: 0 24px 64px rgba(0,0,0,0.25), 0 2px 8px rgba(0,0,0,0.1);
      border: 1px solid rgba(255,255,255,0.6);
    }

    /* Client portal accent strip */
    .card::before {
      content: '';
      display: block;
      height: 4px;
      margin: -clamp(24px, 5vw, 40px) -clamp(20px, 5vw, 36px) clamp(20px, 3vw, 28px);
      background: linear-gradient(90deg, var(--grad-start), var(--grad-end));
      border-radius: 20px 20px 0 0;
    }

    .card-role-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: linear-gradient(135deg, rgba(13,79,124,0.1), rgba(15,138,114,0.1));
      border: 1.5px solid var(--border);
      border-radius: 20px;
      padding: 5px 14px;
      font-size: clamp(12px, 1.6vw, 13px);
      font-weight: 700;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 10px;
    }

    .card h2 {
      font-size: clamp(18px, 3vw, 22px);
      font-weight: 700;
      color: var(--text);
      margin-bottom: 4px;
    }
    .card-desc {
      font-size: clamp(14px, 2vw, 15px);
      color: var(--muted);
      margin-bottom: clamp(20px, 3vw, 28px);
      line-height: 1.45;
    }

    /* ── ALERT ── */
    .alert-error {
      background: var(--danger-bg);
      border: 1.5px solid var(--danger-bdr);
      border-radius: 10px;
      padding: 13px 16px;
      font-size: clamp(14px, 2vw, 15px);
      font-weight: 500;
      color: var(--danger-text);
      margin-bottom: 20px;
      display: flex;
      align-items: flex-start;
      gap: 9px;
      line-height: 1.4;
    }

    /* ── FORM ── */
    .form-group { margin-bottom: clamp(16px, 2.5vw, 20px); }

    .form-group label {
      display: block;
      font-size: clamp(13px, 1.8vw, 14px);
      font-weight: 700;
      color: var(--sub);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 7px;
    }

    .input-wrap { position: relative; display: flex; align-items: center; }
    .input-icon { position: absolute; left: 15px; font-size: 18px; pointer-events: none; opacity: 0.5; }

    .form-group input {
      width: 100%;
      padding: 0 16px 0 44px;
      height: 52px;
      border: 1.5px solid var(--border);
      border-radius: 11px;
      font-family: 'DM Sans', sans-serif;
      font-size: clamp(15px, 2.2vw, 16px);
      color: var(--text);
      background: var(--bg);
      outline: none;
      transition: border-color .2s, box-shadow .2s, background .2s;
      -webkit-appearance: none;
      appearance: none;
    }
    .form-group input:focus {
      border-color: var(--accent);
      background: #ffffff;
      box-shadow: 0 0 0 3px rgba(15,138,114,0.18);
    }
    .form-group input::placeholder { color: var(--muted); opacity: 0.8; }

    .pwd-toggle {
      position: absolute; right: 14px;
      background: none; border: none; cursor: pointer;
      font-size: 18px; color: var(--muted); padding: 4px; line-height: 1;
      transition: color .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .pwd-toggle:hover { color: var(--accent); }

    /* ── SUBMIT ── */
    .btn-login {
      width: 100%; height: 54px;
      background: linear-gradient(135deg, var(--grad-start), var(--grad-end));
      color: #fff; border: none; border-radius: 11px;
      font-family: 'DM Sans', sans-serif;
      font-size: clamp(15px, 2.2vw, 17px); font-weight: 700;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      margin-top: 8px;
      box-shadow: 0 4px 14px rgba(13,79,124,0.3);
      transition: opacity .15s, transform .15s, box-shadow .15s;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-login:hover  { opacity: 0.92; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(13,79,124,0.35); }
    .btn-login:active { transform: scale(0.98); }

    /* ── DIVIDER ── */
    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: clamp(16px, 3vw, 22px) 0;
      color: var(--muted); font-size: 13px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.05em;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1.5px;
      background: var(--border); border-radius: 1px;
    }

    /* ── ALT LINK ── */
    .alt-link {
      display: flex; align-items: center; justify-content: center; gap: 9px;
      width: 100%; height: 50px;
      border-radius: 11px;
      font-family: 'DM Sans', sans-serif;
      font-size: clamp(14px, 2vw, 15px); font-weight: 600;
      text-decoration: none;
      border: 1.5px solid var(--border);
      background: var(--bg); color: var(--sub);
      transition: all .15s;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .alt-link:hover { border-color: var(--accent); color: var(--accent); background: #e8f7f4; }

    /* ── FOOTER ── */
    .footer-note {
      text-align: center;
      margin-top: clamp(16px, 3vw, 22px);
      font-size: clamp(13px, 1.8vw, 14px);
      color: rgba(255,255,255,0.7);
    }
    .footer-note a {
      color: #fff; font-weight: 700; text-decoration: none;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.22);
      border-radius: 7px; padding: 4px 12px;
      transition: background .15s;
      display: inline-flex; align-items: center; gap: 5px;
    }
    .footer-note a:hover { background: rgba(255,255,255,0.25); }

    /* ── LOADING OVERLAY ── */
    #loading-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(13,27,42,0.65);
      backdrop-filter: blur(4px);
      z-index: 999; align-items: center; justify-content: center;
    }
    #loading-overlay.active { display: flex; }
    .loading-box {
      background: #fff; border-radius: 18px;
      padding: clamp(24px, 4vw, 36px) clamp(28px, 5vw, 48px);
      text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    }
    .loading-spinner {
      width: 48px; height: 48px;
      border: 4px solid var(--border); border-top-color: var(--accent);
      border-radius: 50%; animation: spin .7s linear infinite;
      margin: 0 auto 14px;
    }
    .loading-text { font-size: 16px; font-weight: 700; color: var(--text); }
    .loading-sub  { font-size: 13px; color: var(--muted); margin-top: 4px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 400px) {
      .header-logo { width: 60px; height: 60px; font-size: 28px; }
    }
  </style>
</head>
<body>

<div class="wrap">

  <!-- Header -->
  <div class="header">
    <div class="header-logo">📋</div>
    <div class="header-title">Client Portal</div>
    <div class="header-sub">DepEd Leyte Division Office<br>Submit &amp; Track Your Documents</div>
  </div>

  <!-- Card -->
  <div class="card">
    <div class="card-role-pill">👤 Client Access</div>
    <h2>Sign In</h2>
    <p class="card-desc">Log in to submit documents and track their status in real time.</p>

    {% if error %}
    <div class="alert-error">
      <span>⚠️</span>
      <span>{{ error }}</span>
    </div>
    {% endif %}

    <form method="post" id="login-form" autocomplete="on">

      <div class="form-group">
        <label for="username">Username</label>
        <div class="input-wrap">
          <span class="input-icon">👤</span>
          <input type="text" id="username" name="username"
                 placeholder="Enter your username"
                 autocomplete="username" autofocus required />
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-wrap">
          <span class="input-icon">🔒</span>
          <input type="password" id="password" name="password"
                 placeholder="Enter your password"
                 autocomplete="current-password" required />
          <button type="button" class="pwd-toggle" id="pwd-toggle"
                  aria-label="Show or hide password">👁</button>
        </div>
      </div>

      <button type="submit" class="btn-login">✅ Sign In</button>

    </form>

    <div class="divider">or</div>

    <a href="/client/register" class="alt-link">📝 Register as New Client</a>
  </div>

  <!-- Footer -->
  <div class="footer-note">
    DepEd Staff? &nbsp;<a href="/login">🔐 Staff Login →</a>
  </div>

</div>

<!-- Loading Overlay -->
<div id="loading-overlay">
  <div class="loading-box">
    <div class="loading-spinner"></div>
    <div class="loading-text">Signing in…</div>
    <div class="loading-sub">Please wait</div>
  </div>
</div>

<script>
  document.getElementById('login-form').addEventListener('submit', function () {
    document.getElementById('loading-overlay').classList.add('active');
  });
  window.addEventListener('pageshow', function (e) {
    if (e.persisted) document.getElementById('loading-overlay').classList.remove('active');
  });

  const pwdInput  = document.getElementById('password');
  const pwdToggle = document.getElementById('pwd-toggle');
  pwdToggle.addEventListener('click', function () {
    const show = pwdInput.type === 'password';
    pwdInput.type         = show ? 'text' : 'password';
    pwdToggle.textContent = show ? '🙈' : '👁';
    pwdToggle.setAttribute('aria-label', show ? 'Hide password' : 'Show password');
  });
</script>
</body>
</html>
