<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>Client Login — DocTracker DepEd Leyte</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'DM Sans',sans-serif;background:linear-gradient(135deg,#064E3B 0%,#065F46 60%,#10B981 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
    .wrap{width:100%;max-width:420px;}
    .header{text-align:center;margin-bottom:28px;}
    .header-logo{font-size:52px;margin-bottom:10px;}
    .header-title{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;color:#fff;margin-bottom:4px;}
    .header-sub{font-size:13px;color:#A7F3D0;}
    .card{background:#fff;border-radius:18px;padding:32px;box-shadow:0 24px 64px rgba(0,0,0,.25);}
    .card h2{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:#064E3B;margin-bottom:4px;}
    .card p{font-size:13px;color:#6B7FA3;margin-bottom:22px;}
    .error-box{background:#FEE2E2;border:1.5px solid #EF4444;border-radius:9px;padding:12px 14px;font-size:14px;color:#7F1D1D;margin-bottom:18px;}
    .form-group{margin-bottom:16px;}
    .form-group label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#6B7FA3;margin-bottom:5px;}
    .form-group input{width:100%;padding:12px 14px;border:1.5px solid #DDE3EE;border-radius:10px;font-family:inherit;font-size:16px;color:#1A2B45;background:#F4F7FB;outline:none;min-height:50px;transition:border .15s;}
    .form-group input:focus{border-color:#10B981;background:#fff;box-shadow:0 0 0 3px rgba(16,185,129,.15);}
    .btn{width:100%;padding:14px;background:#10B981;color:#fff;border:none;border-radius:10px;font-family:inherit;font-size:16px;font-weight:700;cursor:pointer;min-height:52px;margin-top:4px;}
    .btn:hover{background:#059669;}
    .divider{display:flex;align-items:center;gap:10px;margin:18px 0;color:#6B7FA3;font-size:12px;}
    .divider::before,.divider::after{content:'';flex:1;height:1px;background:#DDE3EE;}
    .alt-link{display:flex;align-items:center;justify-content:center;gap:8px;padding:12px;border:1.5px solid #DDE3EE;border-radius:10px;font-size:14px;font-weight:600;color:#6B7FA3;text-decoration:none;background:#F4F7FB;}
    .alt-link:hover{border-color:#10B981;color:#059669;}
    .footer-note{text-align:center;margin-top:14px;font-size:12px;color:#A7F3D0;}
    .footer-note a{color:#fff;text-decoration:none;font-weight:600;}
    #loading-overlay{display:none;position:fixed;inset:0;background:rgba(6,78,59,.6);backdrop-filter:blur(3px);z-index:999;align-items:center;justify-content:center;}
    #loading-overlay.active{display:flex;}
    .loading-box{background:#fff;border-radius:16px;padding:32px 40px;text-align:center;}
    .loading-spinner{width:44px;height:44px;border:4px solid #DDE3EE;border-top-color:#10B981;border-radius:50%;animation:spin .75s linear infinite;margin:0 auto 14px;}
    .loading-text{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:#064E3B;}
    @keyframes spin{to{transform:rotate(360deg);}}
  </style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="header-logo">📋</div>
    <div class="header-title">Client Portal</div>
    <div class="header-sub">DepEd Leyte Division — Submit & Track Your Documents</div>
  </div>
  <div class="card">
    <h2>Sign In</h2>
    <p>Log in to submit documents and track their status.</p>
    {% if error %}<div class="error-box">❌ {{ error }}</div>{% endif %}
    <form method="post" id="login-form">
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" placeholder="Enter your username" autocomplete="username" autofocus required />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="Enter your password" autocomplete="current-password" required />
      </div>
      <button type="submit" class="btn">✅ Sign In</button>
    </form>
    <div class="divider">or</div>
    <a href="/client/register" class="alt-link">📝 Register as New Client</a>
  </div>
  <div class="footer-note">
    Staff? <a href="/login">Sign in here instead →</a>
  </div>
</div>
<div id="loading-overlay">
  <div class="loading-box">
    <div class="loading-spinner"></div>
    <div class="loading-text">Signing in...</div>
  </div>
</div>
<script>
document.getElementById('login-form').addEventListener('submit',()=>document.getElementById('loading-overlay').classList.add('active'));
window.addEventListener('pageshow',e=>{if(e.persisted)document.getElementById('loading-overlay').classList.remove('active');});
</script>
</body>
</html>
