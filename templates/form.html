{% extends "base.html" %}
{% block content %}

<div class="page-header">
  {% if action == 'edit' %}
    <a href="/view/{{ doc.id }}" class="page-back">← Back</a>
    <div class="page-title">Edit Document</div>
  {% else %}
    <a href="/" class="page-back">← Back</a>
    <div class="page-title">Add New Document</div>
  {% endif %}
</div>

<form method="post">

  <!-- Document Info -->
  <div class="form-card">
    <h3>📄 Document Info</h3>
    <div class="form-row">
      <div class="form-group">
        <label>Document Name <span class="req">*</span></label>
        <input type="text" name="doc_name" value="{{ doc.get('doc_name','') }}" placeholder="e.g. Contract Agreement 2025" required />
      </div>
      <div class="form-group">
        <label>Document ID / Reference No.</label>
        <input type="text" name="doc_id" value="{{ doc.get('doc_id','') }}" placeholder="e.g. REF-2025-001" />
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Category</label>
        <input type="text" name="category" value="{{ doc.get('category','') }}" placeholder="e.g. Legal, Finance, HR..." />
      </div>
      <div class="form-group">
        <label>Status</label>
        <select name="status">
          {% for s in status_options %}
            <option value="{{ s }}" {% if doc.get('status', 'Pending') == s %}selected{% endif %}>{{ s }}</option>
          {% endfor %}
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea name="description" rows="3" placeholder="Brief description of the document...">{{ doc.get('description','') }}</textarea>
    </div>
  </div>

  <!-- Dates -->
  <div class="form-card">
    <h3>📅 Dates</h3>
    <div class="form-row">
      <div class="form-group">
        <label>Date Received <span class="req">*</span></label>
        <input type="date" name="date_received" value="{{ doc.get('date_received','') }}" />
      </div>
      <div class="form-group">
        <label>Date Released</label>
        <input type="date" name="date_released" value="{{ doc.get('date_released','') }}" />
      </div>
    </div>
  </div>

  <!-- Sender Info -->
  <div class="form-card">
    <h3>📤 Sender / From</h3>
    <div class="form-row">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" name="sender_name" value="{{ doc.get('sender_name','') }}" placeholder="Sender's full name" />
      </div>
      <div class="form-group">
        <label>Organization</label>
        <input type="text" name="sender_org" value="{{ doc.get('sender_org','') }}" placeholder="Company / Department" />
      </div>
    </div>
    <div class="form-group">
      <label>Contact Info (email, phone, address)</label>
      <input type="text" name="sender_contact" value="{{ doc.get('sender_contact','') }}" placeholder="e.g. sender@email.com | +63 9XX XXX XXXX" />
    </div>
  </div>

  <!-- Recipient Info -->
  <div class="form-card">
    <h3>📥 Recipient / To</h3>
    <div class="form-row">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" name="recipient_name" value="{{ doc.get('recipient_name','') }}" placeholder="Recipient's full name" />
      </div>
      <div class="form-group">
        <label>Organization</label>
        <input type="text" name="recipient_org" value="{{ doc.get('recipient_org','') }}" placeholder="Company / Department" />
      </div>
    </div>
    <div class="form-group">
      <label>Contact Info (email, phone, address)</label>
      <input type="text" name="recipient_contact" value="{{ doc.get('recipient_contact','') }}" placeholder="e.g. recipient@email.com | +63 9XX XXX XXXX" />
    </div>
  </div>

  <!-- Notes -->
  <div class="form-card">
    <h3>📝 Notes</h3>
    <div class="form-group">
      <label>Additional Notes / Remarks</label>
      <textarea name="notes" rows="4" placeholder="Any additional information, follow-ups, or remarks...">{{ doc.get('notes','') }}</textarea>
    </div>
  </div>

  <div class="form-actions">
    {% if action == 'edit' %}
      <a href="/view/{{ doc.id }}" class="btn btn-secondary">Cancel</a>
      <button type="submit" class="btn btn-primary">💾 Save Changes</button>
    {% else %}
      <a href="/" class="btn btn-secondary">Cancel</a>
      <button type="submit" class="btn btn-primary">➕ Add Document</button>
    {% endif %}
  </div>

</form>

{% endblock %}
